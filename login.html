<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartRevise AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <i class="bi bi-robot text-primary h1"></i>
                        <h2 class="text-dark fw-800 mt-2">SmartRevise AI</h2>
                    </a>
                </div>

                <div class="card-premium p-4 p-md-5 bg-white border-0 shadow-sm animate-fade-in">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email Address</label>
                            <input type="email" id="email" class="form-control form-control-lg border-2" placeholder=""
                                required>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label small fw-bold">Password</label>
                                <a href="forgot-password.html" class="small text-primary text-decoration-none">Forgot?</a>
                            </div>
                            <div class="input-group">
                                <input type="password" id="password"
                                    class="form-control form-control-lg border-2 border-end-0"
                                    placeholder="Enter your password" required>
                                <span class="input-group-text border-2 bg-white border-start-0" id="togglePassword"
                                    style="cursor: pointer;">
                                    <i class="bi bi-eye text-muted password-toggle"></i>
                                </span>
                            </div>
                        </div>

                        <div id="error-message" class="alert alert-danger border-0 small d-none mb-4"></div>

                        <button type="submit" class="btn btn-premium btn-lg w-100 py-3">
                            Sign In
                        </button>
                    </form>

                    <div class="mt-4 text-center">
                        <p class="small text-muted mb-0">Don't have an account? <a href="register.html"
                                class="text-primary fw-600 text-decoration-none">Create one</a></p>
                    </div>
                </div>

                <div class="mt-5 text-center">
                    <p class="small text-muted">&copy; 2026 SmartRevise AI. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check for common URL parameters
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const errorBox = document.getElementById('error-message');

            if (urlParams.get('registered') === 'true') {
                errorBox.textContent = "Account created successfully! Please sign in.";
                errorBox.className = "alert alert-success border-0 small mb-4";
                errorBox.classList.remove('d-none');
            } else if (urlParams.get('reset') === 'success') {
                errorBox.textContent = "Password updated! Use your new password.";
                errorBox.className = "alert alert-success border-0 small mb-4";
                errorBox.classList.remove('d-none');
            }

            // Clean up URL without refreshing
            if (urlParams.toString()) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-message');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // Reset box style in case it was a success message
            errorBox.className = "alert alert-danger border-0 small mb-4 d-none";

            // Hide previous errors and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing In...';

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("token", data.access_token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    
                    // Default redirection: 'paresh' goes to Analytics, others go to Dashboard
                    if (data.user.username && data.user.username.toLowerCase() === 'paresh') {
                        window.location.href = 'analytics.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }
 else {
                    errorBox.textContent = data.message || "Invalid credentials";
                    errorBox.classList.remove('d-none');
                }
            } catch (err) {
                errorBox.textContent = "Server connection failed. Is the backend running?";
                errorBox.classList.remove('d-none');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In';
            }
        });

        // Toggle Password Visibility
        const togglePassword = document.querySelector('#togglePassword');
        const passwordField = document.querySelector('#password');
        const toggleIcon = togglePassword.querySelector('i');

        togglePassword.addEventListener('click', function () {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            toggleIcon.classList.toggle('bi-eye');
            toggleIcon.classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
