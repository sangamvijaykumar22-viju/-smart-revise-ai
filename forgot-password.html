<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SmartRevise AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <i class="bi bi-robot text-primary h1"></i>
                        <h2 class="text-dark fw-800 mt-2">SmartRevise AI</h2>
                    </a>
                </div>

                <div class="card-premium p-4 p-md-5 bg-white border-0 shadow-sm animate-fade-in">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-circle d-inline-block text-primary mb-3">
                            <i class="bi bi-shield-lock h2 mb-0"></i>
                        </div>
                        <h4 class="fw-bold">Forgot Password?</h4>
                        <p class="text-secondary small">Enter your email and we'll send you a reset token.</p>
                    </div>

                    <form id="forgotPasswordForm">
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Email Address</label>
                            <input type="email" id="email" class="form-control form-control-lg border-2"
                                placeholder="name@example.com" required>
                            <div id="error-message" class="text-danger small mt-2 d-none">Something went wrong.</div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-premium btn-lg w-100 py-3">
                            Send Reset Code
                        </button>
                    </form>

                    <!-- Success Message (initially hidden) -->
                    <div id="success-container" class="d-none text-center py-4">
                        <i class="bi bi-envelope-check-fill text-success display-4 mb-3"></i>
                        <h5 class="fw-bold">Check Your Email</h5>
                        <p class="text-secondary small mb-4">We've sent a 8-character reset code to your email address.</p>
                        <a href="reset-password.html" class="btn btn-dark w-100 py-3 rounded-pill fw-bold">Continue to Reset</a>
                    </div>

                    <div class="mt-4 text-center">
                        <p class="small text-muted mb-0">Remembered your password? <a href="login.html"
                                class="text-primary fw-600 text-decoration-none">Sign In</a></p>
                    </div>
                </div>

                <div class="mt-5 text-center">
                    <p class="small text-muted">&copy; 2026 SmartRevise AI. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorBox = document.getElementById('error-message');
            const successContainer = document.getElementById('success-container');
            const form = document.getElementById('forgotPasswordForm');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';
            errorBox.classList.add('d-none');

            try {
                // We use the Auth utility from auth.js
                // note that backend always returns true for forgot-password for security
                const res = await Auth.checkEmail(email);
                
                // Show success view
                form.classList.add('d-none');
                successContainer.classList.remove('d-none');
                
                // Store email in sessionStorage to pre-fill on next page
                sessionStorage.setItem('reset_email', email);
                
            } catch (err) {
                errorBox.textContent = "Server connection failed. Try again.";
                errorBox.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send Reset Code';
            }
        });
    </script>
</body>

</html>
