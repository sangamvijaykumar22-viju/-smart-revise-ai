<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SmartRevise AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <i class="bi bi-robot text-primary h1"></i>
                        <h2 class="text-dark fw-800 mt-2">SmartRevise AI</h2>
                    </a>
                </div>

                <div class="card-premium p-4 p-md-5 bg-white border-0 shadow-sm animate-fade-in">
                    <div class="text-center mb-4">
                        <div class="bg-success bg-opacity-10 p-3 rounded-circle d-inline-block text-success mb-3">
                            <i class="bi bi-shield-check h2 mb-0"></i>
                        </div>
                        <h4 class="fw-bold">Reset Password</h4>
                        <p class="text-secondary small">Enter the 8-character token from your email.</p>
                    </div>

                    <form id="resetPasswordForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Reset Token</label>
                            <input type="text" id="token" class="form-control form-control-lg border-2"
                                placeholder="E.G. A1B2C3D4" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">New Password</label>
                            <input type="password" id="new-password" class="form-control form-control-lg border-2"
                                placeholder="Enter at least 6 characters" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Confirm New Password</label>
                            <input type="password" id="confirm-password" class="form-control form-control-lg border-2"
                                placeholder="Confirm new password" required>
                            <div id="error-message" class="text-danger small mt-2 d-none">Something went wrong.</div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-premium btn-lg w-100 py-3">
                            Update Password
                        </button>
                    </form>

                    <!-- Success Message (initially hidden) -->
                    <div id="success-container" class="d-none text-center py-4">
                        <i class="bi bi-check-circle-fill text-success display-4 mb-3"></i>
                        <h5 class="fw-bold">Success!</h5>
                        <p class="text-secondary small mb-4">Your password has been updated. You can now login with your new credentials.</p>
                        <a href="login.html?reset=success" class="btn btn-dark w-100 py-3 rounded-pill fw-bold">Go to Sign In</a>
                    </div>
                </div>

                <div class="mt-5 text-center">
                    <p class="small text-muted">&copy; 2026 SmartRevise AI. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if we have email in session
            const emailStored = sessionStorage.getItem('reset_email');
            
            // Check if token was provided in URL
            const urlParams = new URLSearchParams(window.location.search);
            const tokenParam = urlParams.get('token');
            if (tokenParam) document.getElementById('token').value = tokenParam;
        });

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorBox = document.getElementById('error-message');
            const successContainer = document.getElementById('success-container');
            const form = document.getElementById('resetPasswordForm');
            const email = sessionStorage.getItem('reset_email');

            if (!email) {
                errorBox.textContent = "Please go back to Forgot Password page first.";
                errorBox.classList.remove('d-none');
                return;
            }

            if (newPassword !== confirmPassword) {
                errorBox.textContent = "Passwords do not match.";
                errorBox.classList.remove('d-none');
                return;
            }

            if (newPassword.length < 6) {
                errorBox.textContent = "Password must be at least 6 characters.";
                errorBox.classList.remove('d-none');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Updating...';
            errorBox.classList.add('d-none');

            try {
                // resetPassword (email, token, newPassword)
                const res = await Auth.resetPassword(email, token, newPassword);
                
                if (res.success) {
                    form.classList.add('d-none');
                    successContainer.classList.remove('d-none');
                    sessionStorage.removeItem('reset_email');
                } else {
                    errorBox.textContent = res.message || "Invalid token or code expired.";
                    errorBox.classList.remove('d-none');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Update Password';
                }
                
            } catch (err) {
                errorBox.textContent = "Server connection failed. Try again.";
                errorBox.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Update Password';
            }
        });
    </script>
</body>

</html>
