<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | SmartRevise AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <i class="bi bi-robot text-primary h1"></i>
                        <h2 class="text-dark fw-800 mt-2">SmartRevise AI</h2>
                    </a>
                </div>

                <div class="card-premium p-4 p-md-5 bg-white border-0 shadow-sm animate-fade-in">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Full Name</label>
                            <input type="text" id="fullname" class="form-control form-control-lg border-2"
                                placeholder="eg: pavan" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email Address</label>
                            <input type="email" id="email" class="form-control form-control-lg border-2"
                                placeholder="name@example.com" required>
                            <div class="invalid-feedback">Please enter a valid email.</div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Password</label>
                            <div class="input-group">
                                <input type="password" id="password"
                                    class="form-control form-control-lg border-2 border-end-0"
                                    placeholder="Enter your password" minlength="6" required>
                                <span class="input-group-text border-2 bg-white border-start-0" id="togglePassword">
                                    <i class="bi bi-eye text-muted password-toggle"></i>
                                </span>
                            </div>
                            <div class="form-text small">Use a strong password for security.</div>
                        </div>

                        <div id="status-message" class="alert d-none border-0 small mb-4"></div>

                        <button type="submit" class="btn btn-premium btn-lg w-100 py-3">
                            Create Account
                        </button>
                    </form>

                    <div class="mt-4 text-center">
                        <p class="small text-muted mb-0">Already have an account? <a href="login.html"
                                class="text-primary fw-600 text-decoration-none">Sign In</a></p>
                    </div>
                </div>

                <div class="mt-5 text-center">
                    <p class="small text-muted">&copy; 2026 SmartRevise AI. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusBox = document.getElementById('status-message');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // Show loading state
            statusBox.classList.add('d-none');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Account...';

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = 'login.html?registered=true';
                } else {
                    statusBox.textContent = data.message || "Registration failed";
                    statusBox.className = "alert alert-danger border-0 small mb-4";
                    statusBox.classList.remove('d-none');
                }
            } catch (err) {
                statusBox.textContent = "Server connection failed. Is the backend running?";
                statusBox.className = "alert alert-danger border-0 small mb-4";
                statusBox.classList.remove('d-none');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Create Account';
            }
        });

        // Toggle Password Visibility
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        const toggleIcon = togglePassword.querySelector('i');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            toggleIcon.classList.toggle('bi-eye');
            toggleIcon.classList.toggle('bi-eye-slash');
        });
    </script>
</body>

</html>
